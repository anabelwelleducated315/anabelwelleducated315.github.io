name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          AEB90E: ${{ secrets.AEB90E }}
          B5D47D: ${{ secrets.B5D47D }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AEB90E', '')
          bm = os.environ.get('B5D47D', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 1ea938997b20f5643d617d2df55c5076 -->', gm)
          if bm:
              s2 = s2.replace('<!-- 243f13bf306aca53a799c207b5bf -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
